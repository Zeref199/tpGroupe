plugins {
	id 'java'
	id 'org.springframework.boot' version '3.3.11'
	id 'io.spring.dependency-management' version '1.1.7'
}

group = 'com.cegedim.next.core'
version = '0.0.1-SNAPSHOT'

java {
	toolchain {
		languageVersion = JavaLanguageVersion.of(21)
	}
}

repositories {
	mavenCentral()
}

dependencies {
	compileOnly 'org.projectlombok:lombok:1.18.30'
	annotationProcessor 'org.projectlombok:lombok:1.18.30'


	implementation 'org.springframework.boot:spring-boot-starter:2.6.6'
	implementation 'org.springframework.boot:spring-boot-starter-actuator:2.6.6'


	implementation 'org.springframework.boot:spring-boot-starter-web'

	implementation 'com.fasterxml.jackson.core:jackson-core:2.16.1'
	implementation 'com.fasterxml.jackson.core:jackson-databind:2.16.1'
	implementation 'com.fasterxml.jackson.dataformat:jackson-dataformat-xml:2.16.1'

	implementation 'org.elasticsearch.client:elasticsearch-rest-high-level-client:7.10.2'
	implementation 'org.elasticsearch:elasticsearch:7.10.2'
	implementation 'org.elasticsearch:elasticsearch-x-content:7.10.2'
}

bootJar {
	mainClass = 'com.cegedim.next.core.tpgroupeobservabiliteapi.TpGroupeObservabiliteApiApplication'
}
